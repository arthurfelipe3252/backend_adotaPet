name: Docker Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: [adoption, catalog, chat, match, reports, user-auth]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/backend_adotapet-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/backend_adotapet-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
