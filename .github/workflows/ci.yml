name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service: [user-auth, catalog, adoption, chat]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install deps (${{ matrix.service }})
        run: npm ci --prefix services/${{ matrix.service }}

      - name: Build (${{ matrix.service }})
        run: npm run build --prefix services/${{ matrix.service }}

      - name: Test (${{ matrix.service }})
        run: npm test --prefix services/${{ matrix.service }} -- --no-coverage

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Biome
        run: npm install --prefix .

      - name: Lint
        run: npm run lint --prefix .
