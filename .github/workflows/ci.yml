name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

# Cancela runs antigos do mesmo branch quando chega um novo push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Build
        run: npm run build

      # Valida integridade do _journal.json + meta/ das migrations.
      # Pega merges paralelos que corrompem o journal (causou desastre
      # em maio/2026 — ver CLAUDE.md > Migrations).
      - name: Check migrations
        run: npm run db:check

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7
