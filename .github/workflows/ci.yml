name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        service: [adoption, catalog, chat, match, reports, user-auth]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install deps
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Lint
        working-directory: services/${{ matrix.service }}
        run: npm run lint

      - name: Build
        working-directory: services/${{ matrix.service }}
        run: npm run build

      - name: Check migrations
        working-directory: services/${{ matrix.service }}
        run: npm run db:check

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.service }}-${{ github.sha }}
          path: services/${{ matrix.service }}/dist
          retention-days: 7
