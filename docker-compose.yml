x-service-defaults: &service-defaults
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  networks:
    - adotapet-network

services:
  user-auth:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: user-auth
    environment:
      PORT: 4001
      JWT_SECRET: super-secret
      JWT_ACCESS_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/adotapet_user_auth
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4001:4001"
    command: sh -c "npm run db:migrate && npm run start:prod"

  catalog:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: catalog
    environment:
      PORT: 4002
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/adotapet_catalog
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4002:4002"
    command: sh -c "npm run db:migrate && npm run start:prod"

  adoption:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: adoption
    environment:
      PORT: 4003
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/adotapet_adoption
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4003:4003"
    command: sh -c "npm run db:migrate && npm run start:prod"

  chat:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: chat
    environment:
      PORT: 4004
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/adotapet_chat
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4004:4004"
    command: sh -c "npm run db:migrate && npm run start:prod"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - adotapet-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adotapet-network

volumes:
  postgres_data:

networks:
  adotapet-network:
    driver: bridge
